<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Produccion">
    <title>Registro de Ropa - Xiaomi 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%234f46e5'/%3E%3Cpath d='M20 18h24v8H20zm2 10h20v18H22z' fill='white'/%3E%3Cpath d='M28 18v28M36 18v28' stroke='%234f46e5' stroke-width='3'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root {
            color-scheme: light;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        .android-shadow {
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.08), 0 2px 6px -1px rgba(0, 0, 0, 0.04);
        }

        .safe-area-top {
            padding-top: env(safe-area-inset-top);
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        body.keyboard-open #total-footer {
            opacity: 0;
            pointer-events: none;
            transform: translateY(110%);
        }
        
        /* Estilo para los divisores de fecha en el historial */
        .date-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-6 rounded-b-[2.5rem] android-shadow flex justify-between items-center safe-area-top">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tight">Producción</h1>
            <p id="header-subtitle" class="text-indigo-100 text-xs font-medium uppercase tracking-wider">Cargando...</p>
        </div>
        <button onclick="toggleSettings(true)" class="p-2.5 bg-white/10 rounded-2xl active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </header>

    <!-- Modal de Ajustes -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 modal-hidden transition-all duration-300" onclick="toggleSettings(false)">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 android-shadow" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Ajustes</h2>
                <button onclick="toggleSettings(false)" class="text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="space-y-4">
                <div class="p-5 bg-indigo-50 rounded-3xl border border-indigo-100">
                    <h3 class="text-xs font-black text-indigo-600 uppercase tracking-widest mb-3">Backup</h3>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="exportData()" class="flex items-center justify-center gap-2 w-full py-3.5 bg-white border border-indigo-200 text-indigo-600 rounded-2xl font-bold active:scale-95 transition-transform">
                            Exportar (.json)
                        </button>
                        <label class="flex items-center justify-center gap-2 w-full py-3.5 bg-indigo-600 text-white rounded-2xl font-bold active:scale-95 transition-transform cursor-pointer text-center">
                            Importar Datos
                            <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                        </label>
                    </div>
                </div>

                <div class="p-5 bg-rose-50 rounded-3xl border border-rose-100">
                    <h3 class="text-xs font-black text-rose-600 uppercase tracking-widest mb-3">Peligro</h3>
                    <button onclick="clearAllHistory()" class="text-xs text-rose-500 font-bold border border-rose-200 w-full py-3 rounded-2xl bg-white active:bg-rose-50">Vaciar Historial</button>
                </div>
                
                <p class="text-[10px] text-slate-400 text-center font-bold tracking-tighter">APP VER 3.5 • Xiaomi 11 optimized</p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-4 pb-48">
        
        <!-- Tabs -->
        <div class="flex bg-slate-200/50 p-1 rounded-2xl mb-6">
            <button id="tab-calculator" onclick="switchTab('calculator')" class="flex-1 py-3 rounded-[14px] font-bold text-sm bg-white shadow-sm text-indigo-600 transition-all">Registrar</button>
            <button id="tab-history" onclick="switchTab('history')" class="flex-1 py-3 rounded-[14px] font-bold text-sm text-slate-500 transition-all">Historial</button>
            <button id="tab-inventory" onclick="switchTab('inventory')" class="flex-1 py-3 rounded-[14px] font-bold text-sm text-slate-500 transition-all">Prendas</button>
        </div>

        <!-- Vista: Registrar -->
        <section id="view-calculator" class="space-y-5">
            <div class="bg-indigo-600 p-5 rounded-[2rem] shadow-xl shadow-indigo-200">
                <label class="text-[10px] font-black text-indigo-200 uppercase tracking-[0.2em] block mb-2 ml-1">Fecha de trabajo</label>
                <input type="date" id="work-date" class="w-full bg-indigo-500/50 border border-indigo-400/30 rounded-2xl p-4 text-lg font-bold text-white outline-none focus:bg-indigo-500" autocomplete="off">
            </div>

            <div class="relative">
                <input type="text" id="search-input" oninput="searchItems(this.value)" placeholder="Buscar prenda por nombre..." class="w-full p-5 pl-14 bg-white border-none rounded-[1.5rem] android-shadow focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 absolute left-5 top-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <div id="search-results" class="hidden space-y-2 max-h-72 overflow-y-auto rounded-[1.5rem]"></div>

            <div class="flex justify-between items-center pt-4">
                <h2 class="text-xl font-extrabold text-slate-800">Cola de registro</h2>
                <button onclick="clearDrafts()" class="text-[10px] text-slate-400 font-black uppercase tracking-widest px-3 py-1">Limpiar</button>
            </div>
            
            <div id="calculator-drafts" class="space-y-4"></div>
        </section>

        <!-- Vista: Historial (Rediseñada) -->
        <section id="view-history" class="hidden space-y-6">
            <div class="flex items-center justify-between bg-white p-4 rounded-3xl android-shadow border border-slate-100">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest ml-2">Mes de consulta</span>
                <input type="month" id="month-filter" onchange="updateView()" class="bg-slate-50 border-none rounded-xl p-2.5 text-sm font-bold text-indigo-600 outline-none" autocomplete="off">
            </div>
            
            <div id="history-grouped-list" class="space-y-8">
                <!-- Los grupos de fecha se generarán aquí -->
            </div>
        </section>

        <!-- Vista: Prendas -->
        <section id="view-inventory" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] android-shadow border border-slate-50 space-y-5">
                <h2 id="form-title" class="text-lg font-extrabold text-slate-800">Nueva Prenda</h2>
                <input type="hidden" id="edit-id" value="">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nombre</label>
                        <input type="text" id="input-name" placeholder="Ej: Polo Azul" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none font-semibold" autocomplete="off" autocapitalize="words">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Categoría</label>
                        <input type="text" id="input-category" placeholder="Ej: Invierno" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none font-semibold" autocomplete="off" autocapitalize="words">
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Precio Unitario (Pesetas)</label>
                        <input type="number" id="input-price" min="0" step="1" inputmode="numeric" oninput="updateEuroPreview(this.value)" class="w-full p-4 bg-indigo-50 rounded-2xl border border-indigo-100 text-indigo-600 font-bold text-xl outline-none" autocomplete="off">
                        <p id="euro-preview" class="mt-2 text-sm text-indigo-400 font-medium italic">≈ 0,00 €</p>
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button id="btn-save" onclick="saveItem()" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl active:scale-95 transition-transform">GUARDAR</button>
                    <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-100 text-slate-500 font-bold px-6 py-4 rounded-2xl">X</button>
                </div>
            </div>

            <div class="pt-4">
                <h2 class="text-xl font-extrabold text-slate-800 mb-4">Catálogo Registrado</h2>
                <div id="manage-list" class="space-y-3"></div>
            </div>
        </section>

    </main>

    <!-- Total Footer -->
    <footer id="total-footer" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 p-6 rounded-t-[2.5rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] safe-area-bottom">
        <div class="max-w-md mx-auto grid grid-cols-2 gap-6">
            <div>
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.15em] mb-1">Total Pesetas</p>
                <p id="total-price-pts" class="text-2xl font-black text-indigo-600 leading-none">0 pts</p>
            </div>
            <div class="text-right border-l border-slate-100 pl-6">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.15em] mb-1">Total Euros</p>
                <p id="total-price-eur" class="text-2xl font-black text-emerald-500 leading-none">0,00€</p>
            </div>
        </div>
    </footer>

    <script>
        const EURO_CONVERSION = 166.386;
        let db;
        let drafts = [];

        function padNumber(value) {
            return String(value).padStart(2, '0');
        }

        function formatLocalDate(date) {
            return `${date.getFullYear()}-${padNumber(date.getMonth() + 1)}-${padNumber(date.getDate())}`;
        }

        function formatLocalMonth(date) {
            return `${date.getFullYear()}-${padNumber(date.getMonth() + 1)}`;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function setKeyboardMode() {
            if (!window.visualViewport) return;
            const keyboardOpen = window.visualViewport.height < window.innerHeight * 0.8;
            document.body.classList.toggle('keyboard-open', keyboardOpen);
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setKeyboardMode);
            window.visualViewport.addEventListener('scroll', setKeyboardMode);
        }
        window.addEventListener('focusin', setKeyboardMode);
        window.addEventListener('focusout', () => {
            window.setTimeout(setKeyboardMode, 50);
        });

        // Inicializar IndexedDB
        const request = indexedDB.open("ArmarioDB", 3);

        request.onupgradeneeded = (event) => {
            db = event.target.result;
            if (!db.objectStoreNames.contains("prendas")) db.createObjectStore("prendas", { keyPath: "id", autoIncrement: true });
            if (!db.objectStoreNames.contains("historial")) db.createObjectStore("historial", { keyPath: "id", autoIncrement: true });
        };

        request.onsuccess = (event) => {
            db = event.target.result;
            const now = new Date();
            document.getElementById('month-filter').value = formatLocalMonth(now);
            document.getElementById('work-date').value = formatLocalDate(now);
            document.body.classList.toggle('standalone-mode', window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            setKeyboardMode();
            updateView();
        };

        function switchTab(tab) {
            const views = ['view-calculator', 'view-history', 'view-inventory'];
            const tabs = ['tab-calculator', 'tab-history', 'tab-inventory'];
            views.forEach(v => document.getElementById(v).classList.add('hidden'));
            tabs.forEach(t => document.getElementById(t).className = "flex-1 py-3 rounded-[14px] font-bold text-sm text-slate-500 transition-all");
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 py-3 rounded-[14px] font-bold text-sm bg-white shadow-sm text-indigo-600 transition-all";
            updateView();
        }

        function updateView() {
            const activeTab = document.querySelector('[id^="tab-"].text-indigo-600').id;
            if (activeTab === 'tab-calculator') renderDrafts();
            if (activeTab === 'tab-history') renderHistoryGrouped();
            if (activeTab === 'tab-inventory') loadManageList();
            calculateMonthlyTotal();
        }

        function toggleSettings(show) {
            document.getElementById('settings-modal').classList.toggle('modal-hidden', !show);
        }

        // --- GESTIÓN DE PRENDAS ---
        function saveItem() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('input-name').value;
            const category = document.getElementById('input-category').value;
            const pricePts = parseInt(document.getElementById('input-price').value);
            if (!name || isNaN(pricePts)) return alert("Rellena nombre y precio");
            const tx = db.transaction("prendas", "readwrite");
            const item = { name, category, pricePts };
            if (id) item.id = parseInt(id);
            tx.objectStore("prendas").put(item);
            tx.oncomplete = () => { resetForm(); loadManageList(); };
        }

        function loadManageList() {
            const container = document.getElementById('manage-list');
            container.innerHTML = '';
            db.transaction("prendas").objectStore("prendas").getAll().onsuccess = (e) => {
                e.target.result.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl android-shadow flex justify-between items-center mb-3 border border-slate-50 fade-in";
                    div.innerHTML = `
                        <div class="truncate">
                            <p class="font-bold text-slate-800">${escapeHtml(item.name)}</p>
                            <p class="text-[9px] text-indigo-400 font-black uppercase tracking-widest">${escapeHtml(item.category || 'General')}</p>
                            <p class="text-sm font-black text-indigo-600 mt-1">${escapeHtml(item.pricePts)} pts</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editItem(${item.id})" class="p-3 bg-slate-50 text-slate-400 rounded-xl active:bg-indigo-50 active:text-indigo-600">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            };
        }

        function editItem(id) {
            db.transaction("prendas").objectStore("prendas").get(id).onsuccess = (e) => {
                const item = e.target.result;
                document.getElementById('form-title').innerText = "Editando Prenda";
                document.getElementById('edit-id').value = item.id;
                document.getElementById('input-name').value = item.name;
                document.getElementById('input-category').value = item.category;
                document.getElementById('input-price').value = item.pricePts;
                document.getElementById('btn-save').innerText = "ACTUALIZAR";
                document.getElementById('btn-cancel').classList.remove('hidden');
                updateEuroPreview(item.pricePts);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Nueva Prenda";
            document.getElementById('edit-id').value = "";
            document.getElementById('input-name').value = "";
            document.getElementById('input-category').value = "";
            document.getElementById('input-price').value = "";
            document.getElementById('euro-preview').innerText = "≈ 0,00 €";
            document.getElementById('btn-save').innerText = "GUARDAR";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function updateEuroPreview(pts) {
            const euro = (parseFloat(pts) || 0) / EURO_CONVERSION;
            document.getElementById('euro-preview').innerText = `≈ ${euro.toLocaleString('es-ES', { minimumFractionDigits: 2 })} €`;
        }

        // --- REGISTRO ---
        function searchItems(query) {
            const resultsDiv = document.getElementById('search-results');
            if (!query.trim()) return resultsDiv.classList.add('hidden');
            db.transaction("prendas").objectStore("prendas").getAll().onsuccess = (e) => {
                const filtered = e.target.result.filter(i => i.name.toLowerCase().includes(query.toLowerCase()));
                resultsDiv.classList.toggle('hidden', filtered.length === 0);
                resultsDiv.innerHTML = filtered.map(item => `
                    <div onclick="addDraft(${item.id})" class="bg-white p-4 border-b border-slate-50 flex justify-between items-center active:bg-indigo-50">
                        <div>
                            <p class="text-sm font-bold text-slate-800">${escapeHtml(item.name)}</p>
                            <p class="text-[9px] text-indigo-400 font-black uppercase tracking-widest">${escapeHtml(item.category || 'General')}</p>
                        </div>
                        <p class="text-sm font-black text-indigo-600">${escapeHtml(item.pricePts)} pts</p>
                    </div>
                `).join('');
            };
        }

        function addDraft(id) {
            db.transaction("prendas").objectStore("prendas").get(id).onsuccess = (e) => {
                const item = e.target.result;
                drafts.push({ ...item, draftId: Date.now(), qty: 1, selectedSize: "" });
                document.getElementById('search-input').value = "";
                document.getElementById('search-results').classList.add('hidden');
                renderDrafts();
            };
        }

        function renderDrafts() {
            const container = document.getElementById('calculator-drafts');
            if (drafts.length === 0) {
                container.innerHTML = `<div class="text-center py-12 px-6 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2rem]">
                    <p class="text-slate-400 text-sm font-medium italic">Busca prendas arriba para empezar a registrar tu trabajo</p>
                </div>`;
                return;
            }
            container.innerHTML = drafts.map(item => `
                <div class="bg-white p-5 rounded-[2rem] android-shadow border-l-[6px] border-indigo-500 fade-in">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-black text-slate-800 text-lg leading-tight">${escapeHtml(item.name)}</h3>
                            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mt-0.5">${escapeHtml(item.pricePts)} pts / unidad</p>
                        </div>
                        <button onclick="removeDraft(${item.draftId})" class="bg-slate-50 p-2 rounded-xl text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Talla</label>
                            <input type="text" placeholder="Ej: XL" oninput="updateDraft(${item.draftId}, 'selectedSize', this.value)" value="${escapeHtml(item.selectedSize)}" class="w-full bg-transparent p-0 text-sm font-bold text-slate-700 outline-none" autocomplete="off" autocapitalize="characters">
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl">
                            <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1 text-center">Cantidad</label>
                            <input type="number" min="1" inputmode="numeric" oninput="updateDraft(${item.draftId}, 'qty', this.value)" value="${escapeHtml(item.qty)}" class="w-full bg-transparent p-0 text-lg font-black text-indigo-600 outline-none text-center" autocomplete="off">
                        </div>
                    </div>
                    <button onclick="commitRecord(${item.draftId})" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm tracking-widest active:scale-95 transition-transform shadow-lg shadow-indigo-100">REGISTRAR</button>
                </div>
            `).join('');
        }

        function updateDraft(id, f, v) { const d = drafts.find(x => x.draftId === id); if(d) d[f] = v; }
        function removeDraft(id) { drafts = drafts.filter(x => x.draftId !== id); renderDrafts(); }
        function clearDrafts() { drafts = []; renderDrafts(); }

        function commitRecord(draftId) {
            const index = drafts.findIndex(d => d.draftId === draftId);
            const item = drafts[index];
            const dateStr = document.getElementById('work-date').value;
            if (!dateStr) return alert("Selecciona fecha");
            
            const now = new Date();
            const date = new Date(dateStr);
            date.setHours(now.getHours(), now.getMinutes(), now.getSeconds());

            const entry = {
                nombre: escapeHtml(item.name),
                precioUnitario: item.pricePts,
                talla: escapeHtml(item.selectedSize || "-"),
                cantidad: parseInt(item.qty) || 1,
                totalPts: item.pricePts * (parseInt(item.qty) || 1),
                fecha: date
            };

            const tx = db.transaction("historial", "readwrite");
            tx.objectStore("historial").add(entry);
            tx.oncomplete = () => { drafts.splice(index, 1); renderDrafts(); calculateMonthlyTotal(); };
        }

        // --- HISTORIAL AGRUPADO ---
        function renderHistoryGrouped() {
            const container = document.getElementById('history-grouped-list');
            container.innerHTML = '<div class="text-center py-20 text-slate-400 font-medium">Buscando registros...</div>';
            
            const monthVal = document.getElementById('month-filter').value; 
            db.transaction("historial").objectStore("historial").getAll().onsuccess = (e) => {
                const filtered = e.target.result.filter(entry => formatLocalMonth(new Date(entry.fecha)) === monthVal)
                                  .sort((a, b) => b.fecha - a.fecha);

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 text-slate-400 font-medium italic">No hay nada anotado en este mes</div>';
                    return;
                }

                // Agrupar por fecha local
                const groups = {};
                filtered.forEach(entry => {
                    const dateObj = new Date(entry.fecha);
                    const dateKey = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    // Capitalizar primera letra (Viernes...)
                    const formattedKey = dateKey.charAt(0).toUpperCase() + dateKey.slice(1);
                    if (!groups[formattedKey]) groups[formattedKey] = [];
                    groups[formattedKey].push(entry);
                });

                container.innerHTML = Object.keys(groups).map(dateTitle => `
                    <div class="space-y-4">
                        <div class="date-header py-2">
                            <h3 class="text-sm font-black text-indigo-600 uppercase tracking-widest pl-2 border-l-4 border-indigo-500">${escapeHtml(dateTitle)}</h3>
                        </div>
                        <div class="space-y-3">
                            ${groups[dateTitle].map(entry => `
                                <div class="bg-white p-4 rounded-2xl android-shadow border border-slate-50 flex justify-between items-center fade-in">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2">
                                            <h4 class="font-bold text-slate-800">${escapeHtml(entry.nombre)}</h4>
                                        </div>
                                        <p class="text-[10px] text-slate-400 font-bold mt-1">
                                            TALLA <span class="text-slate-600">${entry.talla}</span> • 
                                            CANT <span class="text-slate-600">${entry.cantidad}</span>
                                        </p>
                                    </div>
                                    <div class="text-right flex items-center gap-4">
                                        <div>
                                            <p class="text-base font-black text-emerald-500">${escapeHtml(entry.totalPts)} pts</p>
                                            <p class="text-[9px] text-slate-300 font-bold uppercase">${escapeHtml(new Date(entry.fecha).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}))}</p>
                                        </div>
                                        <button onclick="deleteHistoryEntry(${entry.id})" class="text-slate-200 active:text-rose-400 p-1">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            };
        }

        function deleteHistoryEntry(id) {
            if(confirm("¿Borrar registro de este día?")) {
                db.transaction("historial", "readwrite").objectStore("historial").delete(id);
                renderHistoryGrouped();
                calculateMonthlyTotal();
            }
        }

        async function calculateMonthlyTotal() {
            const monthVal = document.getElementById('month-filter').value;
            db.transaction("historial").objectStore("historial").getAll().onsuccess = (e) => {
                const totalPts = e.target.result
                    .filter(entry => formatLocalMonth(new Date(entry.fecha)) === monthVal)
                    .reduce((sum, entry) => sum + entry.totalPts, 0);
                const totalEur = totalPts / EURO_CONVERSION;
                document.getElementById('total-price-pts').innerText = totalPts.toLocaleString('es-ES') + ' pts';
                document.getElementById('total-price-eur').innerText = totalEur.toLocaleString('es-ES', { minimumFractionDigits: 2 }) + '€';
                const [year, month] = monthVal.split('-');
                const monthName = new Date(year, month-1).toLocaleString('es-ES', { month: 'long' });
                document.getElementById('header-subtitle').innerText = `${monthName.toUpperCase()} ${year}`;
            };
        }

        // --- BACKUP ---
        function clearAllHistory() {
            if(confirm("CUIDADO: Se borrará todo el historial. ¿Confirmar?")) {
                const tx = db.transaction("historial", "readwrite");
                tx.objectStore("historial").clear();
                tx.oncomplete = () => { updateView(); toggleSettings(false); };
            }
        }

        function exportData() {
            const tx = db.transaction(["prendas", "historial"], "readonly");
            const pStore = tx.objectStore("prendas").getAll();
            const hStore = tx.objectStore("historial").getAll();
            Promise.all([
                new Promise(r => pStore.onsuccess = () => r(pStore.result)),
                new Promise(r => hStore.onsuccess = () => r(hStore.result))
            ]).then(([prendas, historial]) => {
                const data = JSON.stringify({ prendas, historial }, null, 2);
                const blob = new Blob([data], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `armario_backup_${formatLocalDate(new Date())}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const tx = db.transaction(["prendas", "historial"], "readwrite");
                    if (data.prendas) data.prendas.forEach(p => { delete p.id; tx.objectStore("prendas").add(p); });
                    if (data.historial) data.historial.forEach(h => { delete h.id; h.fecha = new Date(h.fecha); tx.objectStore("historial").add(h); });
                    tx.oncomplete = () => { updateView(); toggleSettings(false); alert("Importado con éxito"); };
                } catch (err) { alert("Archivo inválido"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
